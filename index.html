<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
<title>Century Gate — Quotation &amp; Sales Management</title>
<meta name="theme-color" content="#0A2540"/>
<style>
:root{
  --radius:.875rem;
  --background:#fbfcfd;--foreground:#0b121a;
  --card:#fff;--card-foreground:#0b121a;
  --popover:#fff;--popover-foreground:#0b121a;
  --primary:#042f54;--primary-foreground:#fcfcfc;
  --secondary:#edf2f8;--secondary-foreground:#042f54;
  --muted:#eff2f5;--muted-foreground:#5d646c;
  --accent:#d7eaff;--accent-foreground:#042f54;
  --destructive:#e60018;--border:#dfe1e4;--input:#e2e5e8;--ring:#0073d2;
  --sidebar:#fbfcfd;--sidebar-foreground:#0b121a;
  --sidebar-primary:#042f54;--sidebar-primary-foreground:#fcfcfc;
  --sidebar-accent:#eaeff5;--sidebar-accent-foreground:#042f54;
  --sidebar-border:#dfe1e4;
}
html.dark{
  --background:#05080b;--foreground:#f3f5f8;
  --card:#0b1015;--card-foreground:#f3f5f8;
  --popover:#0b1015;--popover-foreground:#f3f5f8;
  --primary:#0092fb;--primary-foreground:#05080b;
  --secondary:#161b20;--secondary-foreground:#f3f5f8;
  --muted:#161b20;--muted-foreground:#9399a0;
  --accent:#122334;--accent-foreground:#f3f5f8;
  --destructive:#ff6367;--border:#ffffff1a;--input:#ffffff26;--ring:#0092fb;
  --sidebar:#0b1015;--sidebar-foreground:#f3f5f8;
  --sidebar-primary:#0092fb;--sidebar-primary-foreground:#05080b;
  --sidebar-accent:#161b20;--sidebar-accent-foreground:#f3f5f8;
  --sidebar-border:#ffffff1a;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--background);color:var(--foreground);-webkit-font-smoothing:antialiased}
img{max-width:100%}
button,input,select,textarea{font-family:inherit;font-size:inherit;color:inherit}
button{cursor:pointer}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#b9bec4;border-radius:4px}

.app-shell{min-height:100vh;display:flex;background:var(--background)}
.main-col{flex:1;display:flex;flex-direction:column;min-width:0}
.main-content{flex:1;padding-bottom:88px}
@media (min-width:768px){.main-content{padding-bottom:0}}

/* ---------- Sidebar (desktop) ---------- */
.sidebar{display:none;flex-direction:column;width:288px;border-right:1px solid var(--sidebar-border);background:var(--sidebar);position:sticky;top:0;height:100vh}
[dir=rtl] .sidebar{border-right:none;border-left:1px solid var(--sidebar-border)}
@media (min-width:768px){.sidebar{display:flex}}
.sidebar-header{padding:20px;border-bottom:1px solid var(--sidebar-border);display:flex;align-items:center;gap:12px}
.sidebar-logo{height:40px;width:40px;border-radius:12px;background:#fff;border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sidebar-logo img{height:100%;width:100%;object-fit:contain;padding:4px}
.sidebar-name{font-weight:600;font-size:14px;color:var(--sidebar-foreground)}
.sidebar-tagline{font-size:12px;color:var(--muted-foreground)}
.sidebar-newbtn-wrap{padding:16px 16px 8px}
.sidebar-nav{flex:1;padding:12px;display:flex;flex-direction:column;gap:4px;overflow-y:auto}
.nav-btn{width:100%;display:flex;align-items:center;gap:12px;border-radius:12px;padding:10px 12px;font-size:14px;font-weight:500;background:none;border:none;text-align:start;color:var(--sidebar-foreground);opacity:.7;transition:all .15s}
[dir=rtl] .nav-btn{text-align:right}
.nav-btn:hover{background:var(--sidebar-accent);opacity:1}
.nav-btn.active{background:var(--sidebar-accent);color:var(--primary);opacity:1;position:relative}
.nav-btn .dot{margin-left:auto;height:6px;width:6px;border-radius:50%;background:var(--primary);box-shadow:0 0 6px #c9a96180}
[dir=rtl] .nav-btn .dot{margin-left:0;margin-right:auto}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--sidebar-border);font-size:12px;color:var(--muted-foreground);display:flex;justify-content:space-between}
.sidebar-footer .ver{color:var(--primary);font-weight:600}

/* ---------- Header ---------- */
.topheader{position:sticky;top:0;z-index:30;background:color-mix(in oklab,var(--background) 80%,transparent);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.topheader-in{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:56px;gap:12px}
@media (min-width:768px){.topheader-in{padding:0 24px;height:64px}}
.topheader-left{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
.topheader-logo{height:32px;width:32px;border-radius:8px;background:#fff;border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topheader-logo img{height:100%;width:100%;object-fit:contain;padding:2px}
@media (min-width:768px){.topheader-logo{display:none}}
.topheader-title{font-weight:600;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topheader-right{display:flex;align-items:center;gap:6px}

/* ---------- Bottom nav (mobile) ---------- */
.bottomnav{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:6px 4px;position:fixed;bottom:0;left:0;right:0;z-index:40;background:color-mix(in oklab,var(--background) 95%,transparent);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding-bottom:max(env(safe-area-inset-bottom),6px)}
@media (min-width:768px){.bottomnav{display:none}}
.bottomnav button{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:6px;border-radius:12px;background:none;border:none;color:var(--muted-foreground);min-height:44px}
.bottomnav button.active{background:var(--accent);color:var(--primary);font-weight:600}
.bottomnav button span{font-size:10px;font-weight:500}

/* ---------- Buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:10px;padding:8px 14px;font-size:14px;font-weight:500;border:1px solid transparent;transition:transform .15s;white-space:nowrap}
.btn:active{transform:scale(.96)}
.btn-primary{color:#fff!important;background:linear-gradient(135deg,#0a2540 0%,#1a3a5c 50%,#007aff 100%);box-shadow:0 4px 12px #0a254040,inset 0 1px #ffffff40;border:none}
.btn-primary:hover{box-shadow:0 6px 20px #0a254059}
.btn-glass{color:var(--primary)!important;background:#ffffffa6;border:1px solid #0a254026;box-shadow:0 2px 8px #0a25400f}
html.dark .btn-glass{color:#fff!important;background:#ffffff14;border:1px solid #ffffff26}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--foreground)}
.btn-ghost{background:transparent;border:none;color:var(--foreground)}
.btn-neu{color:var(--primary)!important;background:linear-gradient(145deg,#fff,#e6e9ee);border:none;box-shadow:3px 3px 6px #0a254026,-3px -3px 6px #ffffffe6}
html.dark .btn-neu{color:#fff!important;background:linear-gradient(145deg,#1f2937,#111827);box-shadow:3px 3px 6px #0006,-3px -3px 6px #ffffff0d}
.btn-danger{color:var(--destructive)!important}
.btn-sm{padding:6px 10px;font-size:13px}
.btn-icon{padding:8px;width:36px;height:36px;border-radius:999px}
.btn-block{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ---------- Cards / inputs ---------- */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px}
.card-header{padding:16px 16px 0}
.card-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-body{padding:16px}
.field{margin-bottom:0}
.field label{display:block;font-size:12px;color:var(--muted-foreground);margin-bottom:6px}
.input,select.input,textarea.input{width:100%;border:1px solid var(--input);background:var(--background);border-radius:10px;padding:9px 12px;outline:none}
.input:focus{border-color:#007aff;box-shadow:0 0 0 3px #007aff26}
textarea.input{resize:vertical;min-height:70px}
.grid2{display:grid;grid-template-columns:1fr;gap:12px}
@media (min-width:768px){.grid2{grid-template-columns:1fr 1fr}}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid4{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media (min-width:1024px){.grid4{grid-template-columns:repeat(4,1fr)}}
.space-y > * + *{margin-top:12px}
.muted{color:var(--muted-foreground)}
.small{font-size:12px}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
.badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;text-transform:uppercase}
.badge-draft{background:var(--muted);color:var(--muted-foreground)}
.badge-sent{background:#dbeafe;color:#1d4ed8}
.badge-accepted{background:#dcfce7;color:#15803d}
.badge-rejected{background:#fee2e2;color:#b91c1c}
.badge-expired{background:#f3e8ff;color:#7e22ce}
.badge-invoiced{background:#fef3c7;color:#a16207}
html.dark .badge-sent{background:#1d4ed833;color:#93c5fd}
html.dark .badge-accepted{background:#15803d33;color:#86efac}
html.dark .badge-rejected{background:#b91c1c33;color:#fca5a5}
html.dark .badge-expired{background:#7e22ce33;color:#d8b4fe}
html.dark .badge-invoiced{background:#a1650733;color:#fcd34d}

table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:start;color:var(--muted-foreground);font-weight:500;padding:8px 12px;border-bottom:1px solid var(--border)}
td{padding:10px 12px;border-bottom:1px solid var(--border)}
.text-end{text-align:end}
.text-center{text-align:center}

.modal-backdrop{position:fixed;inset:0;background:#00000080;display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--card);border-radius:16px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;padding:20px}
.modal h3{margin:0 0 14px;font-size:17px}

.empty-state{padding:48px 16px;text-align:center;color:var(--muted-foreground)}
.empty-state .icon{font-size:40px;margin-bottom:8px}

.toast-wrap{position:fixed;top:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:8px}
[dir=rtl] .toast-wrap{right:auto;left:16px}
.toast{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;box-shadow:0 4px 16px #0002;font-size:13px;min-width:200px}
.toast.success{border-color:#15803d;color:#15803d}
.toast.error{border-color:var(--destructive);color:var(--destructive)}

.hero{border-radius:16px;background:linear-gradient(135deg,var(--primary),color-mix(in oklab,var(--primary) 80%,transparent));color:var(--primary-foreground);padding:20px;position:relative;overflow:hidden}
.stat-card{cursor:pointer;text-align:start;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;transition:box-shadow .2s}
.stat-card:hover{box-shadow:0 8px 20px #0a254014}
.stat-icon{height:36px;width:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:8px}

.customer-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;cursor:pointer;display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
.line-item-row{border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}

/* ---------- Print / PDF ---------- */
.no-print{}
@media print{
  body *{visibility:hidden}
  .print-area,.print-area *{visibility:visible}
  .print-area{position:absolute;top:0;left:0;width:100%}
  .no-print{display:none!important}
  @page{size:A4;margin:12mm}
}
.print-doc{background:var(--card);border-radius:24px;border:1px solid var(--border);padding:0;overflow:hidden;box-shadow:0 20px 50px -20px #0a254040,0 2px 8px #0a254014;position:relative}
.print-doc-topbar{height:8px;background:linear-gradient(90deg,#0a2540 0%,#0f3d63 35%,#007aff 75%,#4fc3f7 100%)}
.print-doc-body{padding:24px}
@media (min-width:768px){.print-doc-body{padding:40px}}
.print-doc-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;padding-bottom:24px;margin-bottom:24px;border-bottom:1px solid var(--border);position:relative}
.print-doc-header::after{content:"";position:absolute;bottom:-1px;left:0;width:120px;height:2px;background:linear-gradient(90deg,#0a2540,#007aff)}
.print-doc-logo{height:64px;width:64px;background:#fff;border-radius:16px;border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 14px #0a254026}
.print-doc-logo img{height:100%;width:100%;object-fit:contain;padding:6px}
.print-doc-badge{display:inline-block;background:linear-gradient(135deg,#0a2540 0%,#1a3a5c 50%,#007aff 100%);box-shadow:0 4px 14px #0a254040,inset 0 1px #ffffff40;color:#fff;padding:7px 18px;border-radius:999px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.print-doc-totals-box{background:linear-gradient(160deg,color-mix(in oklab,var(--primary) 6%,var(--card)),var(--card));border:1px solid var(--border);border-radius:16px;padding:16px 18px;box-shadow:0 6px 18px -8px #0a254026}
.print-doc-grandtotal{background:linear-gradient(135deg,#0a2540 0%,#1a3a5c 50%,#007aff 100%);color:#fff;border-radius:12px;padding:12px 16px;box-shadow:0 6px 16px #0a254040,inset 0 1px #ffffff33;margin-top:10px}
.print-doc table{border-radius:12px;overflow:hidden}
.print-doc thead th{background:linear-gradient(180deg,color-mix(in oklab,var(--primary) 7%,var(--card)),var(--card));font-weight:600}
.print-doc-footer{background:linear-gradient(180deg,transparent,color-mix(in oklab,var(--primary) 5%,var(--card)));border-radius:0 0 24px 24px;margin:32px -40px -40px;padding:24px 40px}
@media (max-width:767px){.print-doc-footer{margin:24px -24px -24px;padding:20px 24px}}
</style>
</head>

/* ---------------- Calculation logic (exact port) ---------------- */
function computeLineTotal(item){
  return item.qty * item.unitPrice * (1 - item.discountPercent/100) + (item.clicheCost || 0);
}
function computeQuotationTotals(q){
  var itemsSubtotal = q.items.reduce(function(sum,it){ return sum + computeLineTotal(it); }, 0);
  var afterGlobalDiscount = itemsSubtotal * (1 - q.globalDiscountPercent/100);
  var globalDiscountAmount = itemsSubtotal - afterGlobalDiscount;
  var delivery = q.deliveryCharge || 0;
  var beforeVat = afterGlobalDiscount + delivery;
  var vatAmount = beforeVat * q.vatRate;
  return {
    itemsSubtotal: itemsSubtotal,
    globalDiscountAmount: globalDiscountAmount,
    afterGlobalDiscount: afterGlobalDiscount,
    delivery: delivery,
    beforeVat: beforeVat,
    vatAmount: vatAmount,
    grandTotal: beforeVat + vatAmount
  };
}
function formatCurrency(amount, currency, lang){
  currency = currency || "SAR"; lang = lang || state.settings.language;
  var symbol = currency === "SAR" ? (lang === "ar" ? "ر.س" : "SAR") : currency;
  var formatted = new Intl.NumberFormat(lang === "ar" ? "ar-SA" : "en-US", {minimumFractionDigits:2,maximumFractionDigits:2}).format(amount || 0);
  return lang === "ar" ? (formatted+" "+symbol) : (symbol+" "+formatted);
}
function formatDate(dateStr, lang){
  lang = lang || state.settings.language;
  try{
    return new Intl.DateTimeFormat(lang === "ar" ? "ar-SA" : "en-GB", {day:"2-digit",month:"short",year:"numeric"}).format(new Date(dateStr));

  var prefix = state.settings.quotationPrefix;

    .filter(function(n){ return !isNaN(n); });
  var max = nums.length ? Math.max.apply(null,nums) : state.settings.quotationStartSeq - 1;
  return prefix + String(max+1).padStart(4,"0");
}

}

  // survive a re-render must carry a unique data-fk="..." attribute.
  var active = document.activeElement;
  var fk = active && active.getAttribute ? active.getAttribute("data-fk") : null;
  var selStart = active ? active.selectionStart : null;
  var selEnd = active ? active.selectionEnd : null;

  if(nav.view === "quotation-builder" || nav.view === "quotation-preview"){
    app.innerHTML = '<div class="app-shell">'+renderSidebar()+
      '<div class="main-col">'+renderHeader()+'<main class="main-content" style="padding-bottom:0">'+
      (nav.view === "quotation-builder" ? renderBuilder() : renderPreview())+
      '</main></div></div>';
  } else {
    app.innerHTML = '<div class="app-shell">'+renderSidebar()+
      '<div class="main-col">'+renderHeader()+'<main class="main-content">'+
      renderView()+
      '</main>'+renderBottomNav()+'</div></div>';
  }
  attachGlobalHandlers();

  // Restore focus + cursor position after the redraw
  if(fk){
    var restored = app.querySelector('[data-fk="'+fk+'"]');
    if(restored){
      restored.focus();
      if(typeof selStart === "number" && restored.setSelectionRange){
        try{ restored.setSelectionRange(selStart, selEnd); }catch(e){}
      }
    }
  }
}

/* ---------------- Dashboard ---------------- */
function renderDashboard(){
  var lang = state.settings.language, isAr = lang==="ar";
  var q = state.quotations;
  var todayStr = new Date().toDateString();
  var now = new Date(), month = now.getMonth(), year = now.getFullYear();
  var todays = q.filter(function(x){ return new Date(x.date).toDateString()===todayStr; });
  var thisMonth = q.filter(function(x){ var d=new Date(x.date); return d.getMonth()===month && d.getFullYear()===year; });
  var monthlySalesTotal = thisMonth.filter(function(x){ return x.status==="accepted"||x.status==="invoiced"; }).reduce(function(s,x){ return s+computeQuotationTotals(x).grandTotal; },0);
  var pending = q.filter(function(x){ return x.status==="sent"||x.status==="draft"; });
  var acceptedCount = q.filter(function(x){ return x.status==="accepted"||x.status==="invoiced"; }).length;
  var nonDraftCount = q.filter(function(x){ return x.status!=="draft"; }).length;
  var conversion = nonDraftCount>0 ? Math.round(acceptedCount/nonDraftCount*100) : 0;
  var prod = {
    not_started: q.filter(function(x){return x.productionStatus==="not_started";}).length,
    in_production: q.filter(function(x){return x.productionStatus==="in_production";}).length,
    ready: q.filter(function(x){return x.productionStatus==="ready";}).length,
    delivered: q.filter(function(x){return x.productionStatus==="delivered";}).length
  };
  var recent = q.slice().sort(function(a,b){ return new Date(b.createdAt)-new Date(a.createdAt); }).slice(0,5);
  var currency = state.settings.defaultCurrency;

  var stats = [
    {label:t("todaysQuotations"), value:String(todays.length), sub: todays.length>0 ? formatCurrency(todays.reduce(function(s,x){return s+computeQuotationTotals(x).grandTotal;},0),currency,lang) : t("noQuotationsToday"), color:"background:var(--accent);color:var(--primary)", icon:ICONS.calendarCheck},
    {label:t("monthlySalesTotal"), value:formatCurrency(monthlySalesTotal,currency,lang), sub: thisMonth.length+" "+t("quotations").toLowerCase(), color:"background:#d1fae5;color:#059669", icon:ICONS.wallet},
    {label:t("pendingQuotations"), value:String(pending.length), sub: pending.length>0 ? formatCurrency(pending.reduce(function(s,x){return s+computeQuotationTotals(x).grandTotal;},0),currency,lang) : t("noPendingQuotations"), color:"background:#fef3c7;color:#b45309", icon:ICONS.hourglass},
    {label:t("conversionRate"), value:conversion+"%", sub: acceptedCount+"/"+nonDraftCount+" "+t("quotations").toLowerCase(), color:"background:#f3e8ff;color:#7c3aed", icon:ICONS.trendUp}
  ];

  var html = '';
  html += '<div class="main-content-in" style="padding:16px;max-width:1100px;margin:0 auto">';
  html += '<div class="hero"><div style="position:relative"><div class="small" style="opacity:.8;text-transform:uppercase;letter-spacing:.05em">'+new Date().toLocaleDateString(isAr?"ar-SA":"en-US",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+'</div>';
  html += '<h2 style="font-size:20px;font-weight:600;margin:4px 0 0">'+(isAr ? ("مرحباً بعودتك، "+escapeHtml(state.company.nameAr||state.company.nameEn)) : ("Welcome back, "+escapeHtml(state.company.nameEn)))+'</h2>';
  html += '<p class="small" style="opacity:.85;margin-top:4px">'+(isAr ? ("لديك "+pending.length+" عرض سعر بانتظار الرد و "+prod.in_production+" قيد الإنتاج") : ("You have "+pending.length+" quotations awaiting response and "+prod.in_production+" in production"))+'</p></div></div>';

  html += '<div class="grid4" style="margin-top:16px">';
  stats.forEach(function(s){
    html += '<button class="stat-card" onclick="CGA.setView(\'history\')"><div class="stat-icon" style="'+s.color+'">'+s.icon+'</div>';
    html += '<div class="small muted">'+s.label+'</div><div style="font-size:20px;font-weight:600;margin-top:2px">'+s.value+'</div>';
    html += '<div class="small muted" style="margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+s.sub+'</div></button>';
  });
  html += '</div>';

  html += '<div class="grid2" style="margin-top:16px;align-items:start">';
  // quick actions
  html += '<div class="card"><div class="card-header"><div class="card-title">'+t("quickActions")+'</div></div><div class="card-body" style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  html += '<button class="btn btn-primary" onclick="CGA.setView(\'quotation-builder\')">'+ICONS.plus+' '+t("newQuotation")+'</button>';
  html += '<button class="btn btn-glass" onclick="CGA.setView(\'customers\')">'+ICONS.users+' '+t("customers")+'</button>';
  html += '<button class="btn btn-glass" onclick="CGA.setView(\'history\')">'+ICONS.file+' '+t("history")+'</button>';
  html += '<button class="btn btn-glass" onclick="CGA.setView(\'settings\')">'+ICONS.settings+' '+t("settings")+'</button>';
  html += '</div></div>';
  // production status
  html += '<div class="card"><div class="card-header"><div class="card-title">'+t("productionStatus")+'</div></div><div class="card-body" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">';
  [["not_started",prod.not_started],["in_production",prod.in_production],["ready",prod.ready],["delivered",prod.delivered]].forEach(function(p){
    html += '<div style="border:1px solid var(--border);border-radius:12px;padding:10px;text-align:center"><div style="font-size:18px;font-weight:600">'+p[1]+'</div><div class="small muted">'+t(p[0])+'</div></div>';
  });
  html += '</div></div>';
  html += '</div>';

  // recent quotations
  html += '<div class="card" style="margin-top:16px"><div class="card-header" style="display:flex;justify-content:space-between;align-items:center"><div class="card-title">'+t("recentQuotations")+'</div><button class="btn btn-ghost btn-sm" onclick="CGA.setView(\'history\')">'+t("viewAll")+'</button></div><div class="card-body">';
  if(recent.length===0){
    html += '<div class="empty-state small">'+t("noHistory")+'</div>';
  } else {
    html += '<table><thead><tr><th>'+t("quotationNumber")+'</th><th>'+t("customer")+'</th><th>'+t("date")+'</th><th>'+t("status")+'</th><th class="text-end">'+t("amount")+'</th></tr></thead><tbody>';
    recent.forEach(function(x){
      var tot = computeQuotationTotals(x);
      html += '<tr style="cursor:pointer" onclick="CGA.openPreview(\''+x.id+'\')"><td class="mono">'+escapeHtml(x.number)+'</td><td>'+escapeHtml(x.customerName)+'</td><td>'+formatDate(x.date,lang)+'</td><td><span class="'+statusBadgeClass(x.status)+'">'+statusLabel(x.status)+'</span></td><td class="text-end">'+formatCurrency(tot.grandTotal,x.currency,lang)+'</td></tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div></div>';
  html += '</div>';
  return html;
}

/* ---------------- Quotation Builder ---------------- */
var builderState = null;
function freshBuilderState(){
  var s = state.settings;
  var validUntil = new Date(); validUntil.setDate(validUntil.getDate()+s.defaultQuotationValidityDays);
  return {
    editId:null,
    number: generateQuotationNumber(),
    customerId:"",
    date: new Date().toISOString().slice(0,10),
    validUntil: validUntil.toISOString().slice(0,10),
    currency: s.defaultCurrency,
    items: [],
    globalDiscountPercent:0,
    vatRate: s.defaultVatRate,
    deliveryCharge:0,
    notes:"",
    termsConditions: s.defaultTermsConditions,
    draftItem: {description:"",qty:1,unit:"PCS",unitPrice:0,clicheCost:0,discountPercent:0}
  };
}
function ensureBuilder(){ if(!builderState) builderState = freshBuilderState(); }

function loadQuotationIntoBuilder(id){
  var q = state.quotations.find(function(x){return x.id===id;});
  if(!q) return;
  builderState = {
    editId:id, number:q.number, customerId:q.customerId, date:q.date.slice(0,10), validUntil:q.validUntil.slice(0,10),
    currency:q.currency, items:q.items.slice(), globalDiscountPercent:q.globalDiscountPercent, vatRate:q.vatRate,
    deliveryCharge:q.deliveryCharge, notes:q.notes, termsConditions:q.termsConditions,
    draftItem:{description:"",qty:1,unit:"PCS",unitPrice:0,clicheCost:0,discountPercent:0}
  };
}

function renderBuilder(){
  ensureBuilder();
  var lang = state.settings.language;
  var b = builderState;
  var totals = computeQuotationTotals({items:b.items, globalDiscountPercent:b.globalDiscountPercent, vatRate:b.vatRate, deliveryCharge:b.deliveryCharge});
  var draftTotal = b.draftItem.qty * b.draftItem.unitPrice * (1-b.draftItem.discountPercent/100) + (b.draftItem.clicheCost||0);

  var html = '<div style="padding:16px 16px 160px;max-width:900px;margin:0 auto">';
  html += '<div style="display:flex;justify-content:space-between;align-items:center">';
  html += '<button class="btn btn-glass btn-sm" onclick="CGA.cancelBuilder()">'+ICONS.back+' '+t("cancel")+'</button>';
  html += '<div class="small mono muted">'+escapeHtml(b.number)+'</div></div>';

  html += '<div class="card" style="margin-top:12px"><div class="card-header"><div class="card-title">'+ICONS.file+' '+t("quotationNumber")+'</div></div><div class="card-body space-y">';

  html += '<div class="field"><label>'+t("selectCustomer")+'</label><select class="input" onchange="CGA.builderSet(\'customerId\',this.value)">';
  html += '<option value="">'+t("selectCustomer")+'</option>';
  state.customers.forEach(function(c){ html += '<option value="'+c.id+'" '+(b.customerId===c.id?'selected':'')+'>'+escapeHtml(c.code)+' — '+escapeHtml(c.nameEn)+'</option>'; });
  html += '</select></div>';
  html += '<div class="field"><label>'+t("currency")+'</label><select class="input" onchange="CGA.builderSet(\'currency\',this.value)">';
  ["SAR","USD","AED","EUR","GBP"].forEach(function(c){ html += '<option value="'+c+'" '+(b.currency===c?'selected':'')+'>'+c+'</option>'; });
  html += '</select></div></div>';
  html += '<div class="grid2">';
  html += '<div class="field"><label>'+t("quotationDate")+'</label><input class="input" type="date" value="'+b.date+'" onchange="CGA.builderSet(\'date\',this.value)"/></div>';
  html += '<div class="field"><label>'+t("validUntil")+'</label><input class="input" type="date" value="'+b.validUntil+'" onchange="CGA.builderSet(\'validUntil\',this.value)"/></div>';
  html += '</div></div></div>';

  // line items
  html += '<div class="card" style="margin-top:12px"><div class="card-header"><div class="card-title">'+t("addLineItem")+'</div></div><div class="card-body">';
  if(b.items.length===0){
    html += '<div class="empty-state small">'+t("noItems")+'<br/>'+t("noItemsDesc")+'</div>';
  } else {
    b.items.forEach(function(it,idx){
      var lineTotal = computeLineTotal(it);
      html += '<div class="line-item-row"><div style="display:flex;justify-content:space-between;gap:8px"><div style="font-weight:600;flex:1">'+escapeHtml(it.description||"—")+'</div>';
      html += '<button class="btn btn-neu btn-icon btn-danger" style="width:26px;height:26px;padding:0;flex-shrink:0" onclick="CGA.removeLineItem('+idx+')">'+ICONS.trash+'</button></div>';
      html += '<div class="small muted" style="margin-top:4px">'+it.qty+' '+unitLabel(it.unit)+' × '+formatCurrency(it.unitPrice,b.currency,lang)+
        (it.discountPercent>0 ? (' • '+t("discount")+' '+it.discountPercent+'%') : '') +
        (it.clicheCost>0 ? (' • '+t("clicheCost")+' '+formatCurrency(it.clicheCost,b.currency,lang)) : '') +
        ' • <b>'+formatCurrency(lineTotal,b.currency,lang)+'</b></div></div>';
    });
  }
  // add-line form
  html += '<div class="line-item-row" style="background:var(--muted);border-style:dashed">';
  html += '<div class="field" style="margin-bottom:8px"><label>'+t("description")+'</label><input data-fk="draft.description" class="input" placeholder="'+t("descriptionPlaceholder")+'" value="'+escapeHtml(b.draftItem.description)+'" oninput="CGA.draftSet(\'description\',this.value)"/></div>';
  html += '<div class="grid3" style="margin-bottom:8px">';
  html += '<div class="field"><label>'+t("quantity")+'</label><input data-fk="draft.qty" class="input" type="number" min="0" step="1" value="'+b.draftItem.qty+'" oninput="CGA.draftSet(\'qty\',this.value)"/></div>';
  html += '<div class="field"><label>'+t("unit")+'</label><select class="input" onchange="CGA.draftSet(\'unit\',this.value)">';
  [["PCS","pcs"],["CTN","ctn"],["meter","m"],["kg","kg"],["set","set"],["box","box"],["liter","liter"],["hour","hour"],["sqm","sqm"]].forEach(function(u){
    html += '<option value="'+u[0]+'" '+(b.draftItem.unit===u[0]?'selected':'')+'>'+t(u[1])+'</option>';
  });
  html += '</select></div>';
  html += '<div class="field"><label>'+t("unitPrice")+'</label><input data-fk="draft.unitPrice" class="input" type="number" min="0" step="0.01" value="'+b.draftItem.unitPrice+'" oninput="CGA.draftSet(\'unitPrice\',this.value)"/></div>';
  html += '</div>';
  html += '<div class="grid3">';
  html += '<div class="field"><label>'+t("clicheCost")+'</label><input data-fk="draft.clicheCost" class="input" type="number" min="0" step="0.01" value="'+b.draftItem.clicheCost+'" oninput="CGA.draftSet(\'clicheCost\',this.value)"/></div>';
  html += '<div class="field"><label>'+t("discount")+'</label><input data-fk="draft.discountPercent" class="input" type="number" min="0" max="100" step="1" value="'+b.draftItem.discountPercent+'" oninput="CGA.draftSet(\'discountPercent\',this.value)"/></div>';
  html += '<div class="field"><label>'+t("lineTotal")+'</label><input class="input" disabled value="'+formatCurrency(draftTotal,b.currency,lang)+'"/></div>';
  html += '</div>';
  html += '<button class="btn btn-primary btn-block" style="margin-top:10px" onclick="CGA.addLineItem()">'+ICONS.plus+' '+t("addLine")+'</button>';
  html += '</div>';
  html += '</div></div>';

  // totals & extras
  html += '<div class="card" style="margin-top:12px"><div class="card-body space-y">';
  html += '<div class="grid2">';
  html += '<div class="field"><label>'+t("globalDiscount")+'</label><input data-fk="builder.globalDiscountPercent" class="input" type="number" min="0" max="100" value="'+b.globalDiscountPercent+'" oninput="CGA.builderSet(\'globalDiscountPercent\',this.value)"/></div>';
  html += '<div class="field"><label>'+t("deliveryCharge")+'</label><input data-fk="builder.deliveryCharge" class="input" type="number" min="0" step="0.01" value="'+b.deliveryCharge+'" oninput="CGA.builderSet(\'deliveryCharge\',this.value)"/></div>';
  html += '</div>';
  html += '<div class="field"><label>'+t("vat")+' ('+Math.round(b.vatRate*100)+'%)</label><input data-fk="builder.vatRate" class="input" type="number" min="0" max="1" step="0.01" value="'+b.vatRate+'" oninput="CGA.builderSet(\'vatRate\',this.value)"/></div>';
  html += '<div class="field"><label>'+t("notes")+'</label><textarea data-fk="builder.notes" class="input" placeholder="'+t("addNote")+'" oninput="CGA.builderSet(\'notes\',this.value)">'+escapeHtml(b.notes)+'</textarea></div>';
  html += '<div class="field"><label>'+t("termsConditions")+'</label><textarea data-fk="builder.terms" class="input" style="min-height:110px" oninput="CGA.builderSet(\'termsConditions\',this.value)">'+escapeHtml(b.termsConditions)+'</textarea></div>';
  html += '<div style="border-top:1px solid var(--border);padding-top:10px;display:grid;gap:4px">';
  html += '<div style="display:flex;justify-content:space-between" class="small"><span class="muted">'+t("subtotal")+'</span><span>'+formatCurrency(totals.itemsSubtotal,b.currency,lang)+'</span></div>';
  if(b.globalDiscountPercent>0) html += '<div style="display:flex;justify-content:space-between" class="small"><span class="muted">'+t("globalDiscount")+' ('+b.globalDiscountPercent+'%)</span><span>- '+formatCurrency(totals.globalDiscountAmount,b.currency,lang)+'</span></div>';
  if(b.deliveryCharge>0) html += '<div style="display:flex;justify-content:space-between" class="small"><span class="muted">'+t("deliveryCharge")+'</span><span>'+formatCurrency(totals.delivery,b.currency,lang)+'</span></div>';
  html += '<div style="display:flex;justify-content:space-between" class="small"><span class="muted">'+t("vat")+' ('+Math.round(b.vatRate*100)+'%)</span><span>'+formatCurrency(totals.vatAmount,b.currency,lang)+'</span></div>';
  html += '<div style="display:flex;justify-content:space-between;border-top:1px solid var(--border);padding-top:6px"><span style="font-weight:600">'+t("grandTotal")+'</span><span style="font-weight:700;font-size:18px;color:var(--primary)">'+formatCurrency(totals.grandTotal,b.currency,lang)+'</span></div>';
  html += '</div></div></div>';
  html += '</div>';

  // fixed bottom bar
  html += '<div style="position:fixed;bottom:0;left:0;right:0;background:color-mix(in oklab,var(--background) 95%,transparent);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:12px 16px;z-index:35">';
  html += '<div style="max-width:900px;margin:0 auto;display:flex;gap:8px">';
  html += '<button class="btn btn-outline btn-block" style="height:46px" onclick="CGA.saveQuotation(\'draft\',false)">'+t("saveDraft")+'</button>';
  html += '<button class="btn btn-primary btn-block" style="height:46px" onclick="CGA.saveQuotation(\'sent\',true)">'+t("saveAndPreview")+'</button>';
  html += '</div></div>';
  return html;
}

}

  var html = '<div style="padding:16px;max-width:800px;margin:0 auto" class="space-y">';

  html += fld("companyAddress","company","address",f.company.address);
  html += '</div><div class="grid2">';
  html += fld("companyCity","company","city",f.company.city);
  html += fld("companyCountry","company","country",f.company.country);
  html += '</div><div class="grid2">';
  html += fld("companyPhone","company","phone",f.company.phone);
  html += fld("companyFax","company","fax",f.company.fax);
  html += '</div><div class="grid2">';
  html += fld("companyMobile","company","mobile",f.company.mobile);
  html += fld("companyEmail","company","email",f.company.email);
  html += '</div>';
  html += fld("companyWebsite","company","website",f.company.website);
  html += '</div></div>';

  html += '<div class="card"><div class="card-header"><div class="card-title">'+t("settings")+'</div></div><div class="card-body space-y">';
  html += '<div class="grid2">';
  html += '<div class="field"><label>'+t("defaultCurrency")+'</label><select class="input" onchange="CGA.settingsSet(\'settings\',\'defaultCurrency\',this.value)">';
  ["SAR","USD","AED","EUR","GBP"].forEach(function(c){ html += '<option value="'+c+'" '+(f.settings.defaultCurrency===c?'selected':'')+'>'+c+'</option>'; });
  html += '</select></div>';
  html += '<div class="field"><label>'+t("vatRate")+'</label><input class="input" type="number" min="0" max="1" step="0.01" value="'+f.settings.defaultVatRate+'" oninput="CGA.settingsSet(\'settings\',\'defaultVatRate\',parseFloat(this.value)||0)"/></div>';
  html += '</div><div class="grid2">';
  html += '<div class="field"><label>'+t("quotationValidity")+'</label><input class="input" type="number" min="1" value="'+f.settings.defaultQuotationValidityDays+'" oninput="CGA.settingsSet(\'settings\',\'defaultQuotationValidityDays\',parseInt(this.value)||1)"/></div>';
  html += '<div class="field"><label>'+t("quotationPrefixLabel")+'</label><input class="input mono" value="'+escapeHtml(f.settings.quotationPrefix)+'" oninput="CGA.settingsSet(\'settings\',\'quotationPrefix\',this.value)"/></div>';
  html += '</div>';
  html += '<div class="field"><label>'+t("paymentTerms")+'</label><input class="input" value="'+escapeHtml(f.settings.defaultPaymentTerms)+'" oninput="CGA.settingsSet(\'settings\',\'defaultPaymentTerms\',this.value)"/></div>';
  html += '<div class="field"><label>'+t("termsConditions")+'</label><textarea class="input" style="min-height:120px" oninput="CGA.settingsSet(\'settings\',\'defaultTermsConditions\',this.value)">'+escapeHtml(f.settings.defaultTermsConditions)+'</textarea></div>';
  html += '<div class="grid2">';
  html += '<div class="field"><label>'+t("language")+'</label><select class="input" onchange="CGA.settingsSet(\'settings\',\'language\',this.value)">';
  html += '<option value="en" '+(f.settings.language==="en"?'selected':'')+'>'+t("english")+'</option><option value="ar" '+(f.settings.language==="ar"?'selected':'')+'>'+t("arabic")+'</option></select></div>';
  html += '<div class="field"><label>'+t("theme")+'</label><select class="input" onchange="CGA.settingsSet(\'settings\',\'theme\',this.value)">';
  html += '<option value="light" '+(f.settings.theme==="light"?'selected':'')+'>'+t("light")+'</option><option value="dark" '+(f.settings.theme==="dark"?'selected':'')+'>'+t("dark")+'</option></select></div>';
  html += '</div>';
  html += '<button class="btn btn-primary btn-block" onclick="CGA.saveSettings()">'+t("saveSettings")+'</button>';
  html += '</div></div>';
  html += '</div>';
  function fld(labelKey, section, key, val, rtl){
    return '<div class="field"><label>'+t(labelKey)+'</label><input class="input" '+(rtl?'dir="rtl"':'')+' value="'+escapeHtml(val)+'" oninput="CGA.settingsSet(\''+section+'\',\''+key+'\',this.value)"/></div>';
  }
  return html;
}

/* ---------------- Quotation Preview / Print ---------------- */
function renderPreview(){
  var lang = state.settings.language, isAr = lang==="ar";
  var q = state.quotations.find(function(x){return x.id===nav.previewId;});
  if(!q){
    return '<div style="padding:24px;text-align:center" class="muted"><p>'+t("quotationNotFound")+'</p><button class="btn btn-primary" onclick="CGA.closePreview()">'+t("backToHistory")+'</button></div>';
  }
  var totals = computeQuotationTotals(q);
  var customer = state.customers.find(function(c){return c.id===q.customerId;});
  var fc = function(v){ return formatCurrency(v,q.currency,lang); };

  var html = '<div style="min-height:100vh;background:var(--muted)">';
  html += '<div class="no-print" style="position:sticky;top:56px;z-index:20;background:color-mix(in oklab,var(--background) 95%,transparent);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)">';
  html += '<div style="max-width:900px;margin:0 auto;padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">';
  html += '<button class="btn btn-glass btn-sm" onclick="CGA.closePreview()">'+ICONS.back+' '+t("history")+'</button><div style="flex:1"></div>';
  html += '<select class="input" style="width:auto" onchange="CGA.updateStatus(\''+q.id+'\',this.value)">';
  ["draft","sent","accepted","rejected","expired","invoiced"].forEach(function(s){ html += '<option value="'+s+'" '+(q.status===s?'selected':'')+'>'+statusLabel(s)+'</option>'; });
  html += '</select>';
  html += '<button class="btn btn-glass btn-sm" onclick="CGA.editFromPreview(\''+q.id+'\')">'+ICONS.edit+' '+t("edit")+'</button>';
  if(customer){
    html += '<button class="btn btn-glass btn-sm" onclick="CGA.shareWhatsapp(\''+q.id+'\')">'+ICONS.whatsapp+' WhatsApp</button>';
  }
  html += '<button class="btn btn-primary btn-sm" onclick="window.print()">'+ICONS.print+' '+t("print")+'</button>';
  html += '</div></div>';

  html += '<div class="print-area" style="max-width:900px;margin:0 auto;padding:16px">';
  html += '<div class="print-doc"><div class="print-doc-topbar"></div><div class="print-doc-body">';
  html += '<div class="print-doc-header">';
  html += '<div style="display:flex;gap:12px;align-items:flex-start"><div class="print-doc-logo"><img src="'+state.company.logoUrl+'" alt="logo"/></div>';
  html += '<div><h1 style="font-size:20px;font-weight:700;color:var(--primary);margin:0">'+escapeHtml(isAr?(state.company.nameAr||state.company.nameEn):state.company.nameEn)+'</h1>';
  html += '<p class="small muted" style="margin:4px 0 0">'+escapeHtml(state.company.address)+', '+escapeHtml(state.company.city)+', '+escapeHtml(state.company.country)+'</p>';
  html += '<p class="small muted" style="margin:2px 0 0">'+escapeHtml(state.company.phone)+(state.company.fax?' • Fax: '+escapeHtml(state.company.fax):'')+'</p>';
  html += '<p class="small muted" style="margin:2px 0 0">'+escapeHtml(state.company.email)+(state.company.website?' • '+escapeHtml(state.company.website):'')+'</p>';
  html += '<p class="small muted" style="margin:2px 0 0">VAT: <span class="mono">'+escapeHtml(state.company.vatNumber)+'</span></p></div></div>';
  html += '<div style="text-align:end"><div class="print-doc-badge">'+t("quotation")+'</div>';
  html += '<div style="font-size:26px;font-weight:700;color:var(--primary);margin-top:8px" class="mono">'+escapeHtml(q.number)+'</div>';
  html += '<div class="small muted" style="margin-top:4px">'+formatDate(q.date,lang)+'</div></div>';
  html += '</div>';

  html += '<div class="grid2" style="padding:24px 0">';
  html += '<div><div class="small muted" style="text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:8px">'+t("to")+':</div>';
  html += '<div style="font-weight:600;font-size:16px">'+escapeHtml(q.customerName)+'</div>';
  if(customer && customer.nameAr) html += '<div class="small muted" dir="rtl">'+escapeHtml(customer.nameAr)+'</div>';
  html += '<div class="small muted" style="margin-top:4px">'+escapeHtml((customer&&customer.contactPerson)||"")+'</div>';
  html += '<div class="small muted">'+escapeHtml((customer&&customer.phone)||"")+'</div>';
  html += '<div class="small muted">'+escapeHtml((customer&&customer.email)||"")+'</div>';
  if(customer && customer.vatNumber) html += '<div class="small muted" style="margin-top:4px">'+t("vatNumber")+': <span class="mono">'+escapeHtml(customer.vatNumber)+'</span></div>';
  if(customer && customer.billingAddress) html += '<div class="small muted" style="margin-top:4px;max-width:300px">'+escapeHtml(customer.billingAddress)+'</div>';
  html += '</div>';
  html += '<div style="text-align:end">';
  html += '<div class="small" style="display:flex;justify-content:flex-end;gap:8px"><span class="muted">'+t("quotationDate")+':</span><span style="font-weight:500">'+formatDate(q.date,lang)+'</span></div>';
  html += '<div class="small" style="display:flex;justify-content:flex-end;gap:8px;margin-top:4px"><span class="muted">'+t("validUntil")+':</span><span style="font-weight:500">'+formatDate(q.validUntil,lang)+'</span></div>';
  html += '<div class="small" style="display:flex;justify-content:flex-end;gap:8px;margin-top:4px"><span class="muted">'+t("currency")+':</span><span style="font-weight:500">'+q.currency+'</span></div>';
  html += '</div></div>';

  html += '<div style="overflow-x:auto"><table><thead><tr><th>#</th><th>'+t("description")+'</th><th class="text-center">'+t("quantity")+'</th><th class="text-end">'+t("unitPrice")+'</th><th class="text-end">'+t("clicheCost")+'</th><th class="text-center">'+t("discount")+'</th><th class="text-end">'+t("lineTotal")+'</th></tr></thead><tbody>';
  q.items.forEach(function(it,idx){
    var lt = computeLineTotal(it);
    html += '<tr><td class="muted">'+(idx+1)+'</td><td style="font-weight:500">'+escapeHtml(it.description)+'</td>';
    html += '<td class="text-center">'+it.qty+' '+unitLabel(it.unit)+'</td>';
    html += '<td class="text-end">'+fc(it.unitPrice)+'</td>';
    html += '<td class="text-end">'+(it.clicheCost>0?fc(it.clicheCost):'—')+'</td>';
    html += '<td class="text-center">'+(it.discountPercent>0?it.discountPercent+'%':'—')+'</td>';
    html += '<td class="text-end" style="font-weight:600">'+fc(lt)+'</td></tr>';
  });
  html += '</tbody></table></div>';

  html += '<div style="display:flex;justify-content:flex-end;margin-top:20px"><div style="width:100%;max-width:340px" class="print-doc-totals-box">';
  html += kv(t("subtotal"), fc(totals.itemsSubtotal));
  if(q.globalDiscountPercent>0) html += kv(t("globalDiscount")+" ("+q.globalDiscountPercent+"%)", "- "+fc(totals.globalDiscountAmount));
  if(q.deliveryCharge>0) html += kv(t("deliveryCharge"), fc(totals.delivery));
  html += kv(t("vat")+" ("+Math.round(q.vatRate*100)+"%)", fc(totals.vatAmount));
  html += '<div class="print-doc-grandtotal" style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:600">'+t("grandTotal")+'</span><span style="font-weight:700;font-size:19px">'+fc(totals.grandTotal)+'</span></div>';
  html += '</div></div>';

  if(q.notes || q.termsConditions){
    html += '<div class="grid2" style="margin-top:32px;padding-top:24px;border-top:1px solid var(--border)">';
    if(q.notes) html += '<div><div class="small muted" style="text-transform:uppercase;font-weight:600;margin-bottom:6px">'+t("notes")+'</div><p class="small" style="white-space:pre-wrap">'+escapeHtml(q.notes)+'</p></div>';
    if(q.termsConditions) html += '<div><div class="small muted" style="text-transform:uppercase;font-weight:600;margin-bottom:6px">'+t("termsConditions")+'</div><p class="small muted" style="white-space:pre-wrap;font-size:11px">'+escapeHtml(q.termsConditions)+'</p></div>';
    html += '</div>';
  }

  html += '<div class="grid2" style="margin-top:40px;padding-top:24px;border-top:1px solid var(--border)">';
  html += '<div><div class="small muted" style="text-transform:uppercase;font-weight:600;margin-bottom:8px">'+t("authorizedBy")+'</div>';
  html += '<div style="height:64px;display:flex;align-items:flex-end">'+(state.company.signatureUrl?'<img src="'+state.company.signatureUrl+'" style="height:56px;object-fit:contain"/>':'')+'</div></div>';
  html += '<div style="text-align:end"><div class="small muted" style="text-transform:uppercase;font-weight:600;margin-bottom:8px">'+t("customerSignature")+'</div>';
  html += '<div style="height:64px;border-bottom:1px solid var(--border)"></div><div class="small muted" style="margin-top:4px">'+escapeHtml(q.customerName)+'</div></div>';
  html += '</div>';

  html += '<div class="print-doc-footer" style="text-align:center" class="small muted">';
  html += '<p style="font-weight:600;color:var(--primary);margin:0">'+t("thankYou")+'</p>';
  html += '<p class="small muted" style="margin:4px 0 0">'+escapeHtml(state.company.nameEn)+' • '+escapeHtml(state.company.email)+' • '+escapeHtml(state.company.phone)+'</p></div>';

  html += '</div></div></div></div>';
  function kv(label,val){ return '<div style="display:flex;justify-content:space-between" class="small"><span class="muted">'+label+'</span><span style="font-weight:500">'+val+'</span></div>'; }
  return html;
}

/* ---------------- Action handlers (extend CGA) ---------------- */
Object.assign(window.CGA, {

  /* Customers */
  customerSearch: function(v){ customerUI.search = v; renderPatch(); },
  openCustomerModal: function(id){
    if(id){
      var c = state.customers.find(function(x){return x.id===id;});
      customerUI.editId = id;
      customerUI.form = {code:c.code,nameEn:c.nameEn,nameAr:c.nameAr||"",contactPerson:c.contactPerson,email:c.email,phone:c.phone,vatNumber:c.vatNumber||"",billingAddress:c.billingAddress,deliveryAddress:c.deliveryAddress||"",notes:c.notes||""};
    } else {
      customerUI.editId = null;
      var nextNum = state.customers.length+1;
      customerUI.form = Object.assign({},EMPTY_CUSTOMER_FORM,{code:"CUST-"+String(nextNum).padStart(3,"0")});
    }
    customerUI.modalOpen = true; render();
  },
  closeCustomerModal: function(){ customerUI.modalOpen=false; customerUI.form=null; customerUI.editId=null; render(); },
  custForm: function(k,v){ customerUI.form[k]=v; },
  saveCustomer: function(){
    var f = customerUI.form;
    if(!f.nameEn.trim()){ toast(t("required"),"error"); return; }
    if(customerUI.editId){
      var c = state.customers.find(function(x){return x.id===customerUI.editId;});
      Object.assign(c,f); c.updatedAt = nowISO();
    } else {
      state.customers.push(Object.assign({id:uid("cust")},f,{createdAt:nowISO(),updatedAt:nowISO()}));
    }
    saveState(); customerUI.modalOpen=false; customerUI.form=null; customerUI.editId=null;
    toast(t("save")+" ✓","success"); render();
  },
  confirmDeleteCustomer: function(id){ customerUI.deleteId = id; render(); },
  cancelDeleteCustomer: function(){ customerUI.deleteId = null; render(); },
  deleteCustomer: function(){
    state.customers = state.customers.filter(function(c){return c.id!==customerUI.deleteId;});
    saveState(); customerUI.deleteId = null; toast(t("delete")+" ✓","success"); render();
  },

  /* History */
  historySearch: function(v){ historyUI.search=v; renderPatch(); },
  historyStatus: function(v){ historyUI.status=v; render(); },
  confirmDeleteQuotation: function(id){ historyUI.deleteId = id; render(); },
  cancelDeleteQuotation: function(){ historyUI.deleteId = null; render(); },
  deleteQuotation: function(){
    state.quotations = state.quotations.filter(function(q){return q.id!==historyUI.deleteId;});
    saveState(); historyUI.deleteId = null; toast(t("quoteDeleted"),"success"); render();
  },
  updateStatus: function(id,status){
    var q = state.quotations.find(function(x){return x.id===id;});
    if(!q) return;
    q.status = status; q.updatedAt = nowISO(); saveState();
    toast(t("statusUpdated"),"success"); render();
  },
  editFromPreview: function(id){ loadQuotationIntoBuilder(id); nav.view="quotation-builder"; render(); },

  /* Builder */
  builderSet: function(k,v){
    ensureBuilder();
    if(k==="globalDiscountPercent"||k==="deliveryCharge") v = parseFloat(v)||0;
    if(k==="vatRate") v = parseFloat(v)||0;
    builderState[k]=v; renderPatch();
  },
  draftSet: function(k,v){
    ensureBuilder();
    if(k==="qty"||k==="unitPrice"||k==="clicheCost"||k==="discountPercent") v = parseFloat(v)||0;
    builderState.draftItem[k]=v; renderPatch();
  },
  addLineItem: function(){
    ensureBuilder();
    var d = builderState.draftItem;
    if(!d.description.trim()){ toast(t("required"),"error"); return; }
    builderState.items.push({id:uid("item"),description:d.description,qty:d.qty||1,unit:d.unit,unitPrice:d.unitPrice||0,clicheCost:d.clicheCost||0,discountPercent:d.discountPercent||0});
    builderState.draftItem = {description:"",qty:1,unit:"PCS",unitPrice:0,clicheCost:0,discountPercent:0};
    render();
  },
  removeLineItem: function(idx){ builderState.items.splice(idx,1); render(); },
  cancelBuilder: function(){ builderState = null; setView("history"); },
  saveQuotation: function(status, goPreview){
    ensureBuilder();
    var b = builderState;
    if(!b.customerId){ toast(t("selectCustomerFirst"),"error"); return; }
    if(b.items.length===0){ toast(t("addOneItem"),"error"); return; }
    var customer = state.customers.find(function(c){return c.id===b.customerId;});
    var isEdit = !!b.editId;
    var q = {
      id: isEdit ? b.editId : uid("quo"),
      number: b.number, customerId: b.customerId, customerName: customer?customer.nameEn:"",
      date: b.date, validUntil: b.validUntil, currency: b.currency, items: b.items,
      globalDiscountPercent: b.globalDiscountPercent, vatRate: b.vatRate, deliveryCharge: b.deliveryCharge,
      notes: b.notes, termsConditions: b.termsConditions,
      status: isEdit ? status : status,
      productionStatus: isEdit ? (state.quotations.find(function(x){return x.id===b.editId;}).productionStatus||"not_started") : "not_started",
      createdAt: isEdit ? state.quotations.find(function(x){return x.id===b.editId;}).createdAt : nowISO(),
      updatedAt: nowISO()
    };
    if(isEdit){
      var idx = state.quotations.findIndex(function(x){return x.id===b.editId;});
      state.quotations[idx] = q;
      toast(t("quoteUpdated"),"success");
    } else {
      state.quotations.push(q);
      toast(t("quoteSaved"),"success");
    }
    saveState();
    var savedId = q.id;
    builderState = null;
    if(goPreview) openPreview(savedId); else setView("history");
  },

  /* Settings */
  settingsSet: function(section,key,val){ ensureSettingsForm(); settingsForm[section][key]=val; },
  handleImageUpload: function(evt, field){
    var file = evt.target.files && evt.target.files[0];
    if(!file) return;
    if(file.size > 1048576){ toast(state.settings.language==="ar"?"حجم الملف يجب أن يكون أقل من 1 ميجابايت":"File must be under 1MB","error"); return; }
    var reader = new FileReader();
    reader.onload = function(){
      ensureSettingsForm();
      settingsForm.company[field] = reader.result;
      render();
    };
    reader.readAsDataURL(file);
  },
  saveSettings: function(){
    ensureSettingsForm();
    state.company = Object.assign({}, settingsForm.company);
    state.settings = Object.assign({}, settingsForm.settings);
    saveState(); toast(t("settingsSaved"),"success"); render();
  },

  /* Share */
  shareWhatsapp: function(id){
    var q = state.quotations.find(function(x){return x.id===id;});
    var customer = state.customers.find(function(c){return c.id===q.customerId;});
    var totals = computeQuotationTotals(q);
    var msg = t("quotation")+" "+q.number+" - "+q.customerName+" - "+formatCurrency(totals.grandTotal,q.currency,state.settings.language);
    var phone = customer && customer.phone ? customer.phone.replace(/[^0-9]/g,"") : "";
    window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg), "_blank");
  }
});

/* Lightweight re-render that preserves scroll + focus for text inputs (used for live search/typing) */
function renderPatch(){ render(); }

function attachGlobalHandlers(){ /* reserved for future direct DOM listeners */ }

/* ---------------- Boot ---------------- */
applyDocDirection();
applyTheme();
render();

</script>
</body>
</html>
